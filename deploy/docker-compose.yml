# Full self-host stack for clearvoiance.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#   # SDK clients point at grpc://127.0.0.1:9100
#
# Bucket `clearvoiance-blobs` is auto-created on first boot via the
# `minio-bootstrap` one-shot. Everything binds to loopback only — no
# production exposure without an explicit reverse proxy.

name: clearvoiance

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"  # HTTP
      - "127.0.0.1:9000:9000"  # Native
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: dev
      CLICKHOUSE_DB: clearvoiance
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: devdevdev
    ports:
      - "127.0.0.1:9002:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio_data:/data

  minio-bootstrap:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 dev devdevdev &&
      mc mb -p local/clearvoiance-blobs || true
      "
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearvoiance
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: clearvoiance
    ports:
      - "127.0.0.1:5499:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "clearvoiance", "-d", "clearvoiance"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  engine:
    build:
      context: ../
      dockerfile: deploy/images/engine/Dockerfile
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    command: >
      serve
      --grpc-addr 0.0.0.0:9100
      --clickhouse-dsn clickhouse://default:dev@clickhouse:9000/clearvoiance
      --postgres-dsn postgres://clearvoiance:dev@postgres:5432/clearvoiance?sslmode=disable
      --minio-endpoint http://minio:9000
      --minio-access-key dev
      --minio-secret-key devdevdev
      --minio-bucket clearvoiance-blobs
      --minio-path-style
    ports:
      - "127.0.0.1:9100:9100"   # gRPC

volumes:
  clickhouse_data:
  minio_data:
  postgres_data:
