# Traefik override for deploy/docker-compose.yml.
#
# Usage:
#   docker compose \
#     --env-file deploy/.env \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.traefik.yml \
#     up -d --build
#
# Exposes the engine's HTTP control plane, the engine's gRPC port (for
# SDK clients that can't share a Docker network with the engine), and
# the dashboard — all over TLS via Traefik.
#
# gRPC routing uses Traefik's HTTP router with scheme=h2c so Traefik
# terminates TLS at the edge and forwards HTTP/2 cleartext to the
# engine's plain gRPC port. SDK clients connect with
#   engine: { url: "<TRAEFIK_GRPC_HOST>:443", tls: true, apiKey: ... }
#
# Prereqs:
#   - External docker network named ${TRAEFIK_NETWORK} (default traefik_proxy)
#     already exists (usually the Traefik stack owns it).
#   - .env has TRAEFIK_* + CLEARVOIANCE_API_URL set (see deploy/.env.example).

services:
  minio:
    networks:
      - default
      - traefik_proxy
    environment:
      # Tells MinIO to render presigned URLs with the public hostname so
      # SDK clients (on other networks) can fetch blobs. Without this,
      # presigned URLs carry `http://minio:9000` which only resolves
      # inside the compose network.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devdevdev}
      MINIO_SERVER_URL: https://${TRAEFIK_MINIO_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_proxy}"
      - "traefik.http.routers.clearvoiance-minio.rule=Host(`${TRAEFIK_MINIO_HOST}`)"
      - "traefik.http.routers.clearvoiance-minio.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.clearvoiance-minio.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.clearvoiance-minio.service=clearvoiance-minio"
      - "traefik.http.services.clearvoiance-minio.loadbalancer.server.port=9000"

  engine:
    networks:
      - default
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_proxy}"
      - "traefik.http.routers.clearvoiance-api.rule=Host(`${TRAEFIK_API_HOST}`)"
      - "traefik.http.routers.clearvoiance-api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.clearvoiance-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.clearvoiance-api.service=clearvoiance-api"
      - "traefik.http.services.clearvoiance-api.loadbalancer.server.port=9101"
      # gRPC router (scheme=h2c → Traefik terminates TLS, forwards HTTP/2
      # cleartext to the engine's gRPC port). SDK clients connect at
      # grpc://${TRAEFIK_GRPC_HOST}:443 with tls:true.
      - "traefik.http.routers.clearvoiance-grpc.rule=Host(`${TRAEFIK_GRPC_HOST}`)"
      - "traefik.http.routers.clearvoiance-grpc.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.clearvoiance-grpc.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.clearvoiance-grpc.service=clearvoiance-grpc"
      - "traefik.http.services.clearvoiance-grpc.loadbalancer.server.port=9100"
      - "traefik.http.services.clearvoiance-grpc.loadbalancer.server.scheme=h2c"

  ui:
    networks:
      - default
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_proxy}"
      - "traefik.http.routers.clearvoiance-ui.rule=Host(`${TRAEFIK_UI_HOST}`)"
      - "traefik.http.routers.clearvoiance-ui.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.clearvoiance-ui.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.clearvoiance-ui.loadbalancer.server.port=3000"

networks:
  traefik_proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_proxy}
