name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-check:
    name: proto lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf lint
        working-directory: proto
      - name: check for breaking changes vs main
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main,subdir=proto'
        working-directory: proto

  go-check:
    name: go build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      - run: go build ./engine/... ./db-observer/...
      - run: go vet ./engine/... ./db-observer/...
      - run: go test ./engine/... ./db-observer/...

  go-integration:
    name: go integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Integration tests use testcontainers-go to spin up real ClickHouse.
      # GitHub-hosted runners have Docker available out of the box.
      - run: go test -tags=integration -timeout=10m ./engine/...

  e2e-smoke:
    name: e2e capture smoke (engine + ClickHouse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Full stack: boot ClickHouse, build engine, stream events from SDK,
      # verify rows landed. Guards against "my tests pass but the real stack is broken."
      - run: WITH_CLICKHOUSE=1 bash scripts/e2e-smoke.sh

  e2e-express:
    name: e2e express adapter (engine + ClickHouse + examples/express-basic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Runs the Express example against engine+ClickHouse, hits it with curl,
      # and asserts rows land as http.express events with correct method/path.
      - run: bash scripts/e2e-smoke-express.sh

  sdk-check:
    name: sdk-node build + test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      - run: pnpm --filter @clearvoiance/node typecheck
      - run: pnpm --filter @clearvoiance/node test
      - run: pnpm --filter @clearvoiance/node build

  ui-check:
    name: ui build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clearvoiance/ui lint
      - run: pnpm --filter @clearvoiance/ui build
