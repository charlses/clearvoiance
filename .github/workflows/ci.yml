name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-check:
    name: proto lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf lint
        working-directory: proto
      - name: check for breaking changes vs main
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main,subdir=proto'
        working-directory: proto

  go-check:
    name: go build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      - run: go build ./engine/... ./db-observer/...
      - run: go vet ./engine/... ./db-observer/...
      - run: go test ./engine/... ./db-observer/...

  go-integration:
    name: go integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Integration tests use testcontainers-go to spin up real ClickHouse.
      # GitHub-hosted runners have Docker available out of the box.
      - run: go test -tags=integration -timeout=10m ./engine/... ./db-observer/...

  e2e-smoke:
    name: e2e capture smoke (engine + ClickHouse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Full stack: boot ClickHouse, build engine, stream events from SDK,
      # verify rows landed. Guards against "my tests pass but the real stack is broken."
      - run: WITH_CLICKHOUSE=1 bash scripts/e2e-smoke.sh

  e2e-express:
    name: e2e express adapter (engine + ClickHouse + examples/express-basic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Runs the Express example against engine+ClickHouse, hits it with curl,
      # and asserts rows land as http.express events with correct method/path.
      - run: bash scripts/e2e-smoke-express.sh

  e2e-socketio:
    name: e2e socket.io adapter (engine + ClickHouse + examples/socketio-basic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Runs the Socket.io example + smoke client against engine+ClickHouse
      # and asserts CONNECT/RECV/EMIT/DISCONNECT rows land with correct ops.
      - run: bash scripts/e2e-smoke-socketio.sh

  e2e-cron:
    name: e2e cron adapter (engine + ClickHouse + examples/cron-basic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Lets heartbeat (every 1s) + flaky (every 2s) tick for 6s, then verifies
      # the expected mix of success / error rows landed in ClickHouse.
      - run: bash scripts/e2e-smoke-cron.sh

  e2e-wal:
    name: e2e WAL durability (engine kill \u2192 batches on disk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Runs online phase, kills the engine, verifies subsequent batches land
      # in the WAL directory as decodable EventBatch protos.
      - run: bash scripts/e2e-smoke-wal.sh

  e2e-wal-restart:
    name: e2e WAL drain across engine restart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Full durability: boots engine + Postgres + ClickHouse, kills the
      # engine mid-capture, restarts it, verifies WAL drains and all
      # events land in ClickHouse.
      - run: bash scripts/e2e-smoke-wal-restart.sh

  e2e-replay:
    name: e2e replay (capture + HTTP dispatcher at N\u00d7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Captures a session against the express example, then replays it at
      # 10x against a tracking target server, then verifies the target saw
      # the requests and ClickHouse has replay_events rows with latency/lag.
      - run: bash scripts/e2e-smoke-replay.sh

  e2e-replay-vu:
    name: e2e replay virtual users + auth + mutator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Replays one captured event with 3 virtual users, a unique-email
      # mutator on $.email, and a static-swap auth. Asserts target receives
      # 3 distinct emails + the swapped Authorization header on every request.
      - run: bash scripts/e2e-smoke-replay-vu.sh

  sdk-check:
    name: sdk-node build + test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      - run: pnpm --filter @clearvoiance/node typecheck
      - run: pnpm --filter @clearvoiance/node test
      - run: pnpm --filter @clearvoiance/node build

  sdk-integration:
    name: sdk-node integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate proto bindings
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.68.1
          setup_only: true
      - run: buf generate
        working-directory: proto
      # Proves instrumentPg sets application_name = clv:<eventId> correctly
      # against a real Postgres. GitHub runners ship with Docker.
      - run: pnpm --filter @clearvoiance/node test:integration

  ui-check:
    name: ui build + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clearvoiance/ui lint
      - run: pnpm --filter @clearvoiance/ui typecheck
      - run: pnpm --filter @clearvoiance/ui build

  site-check:
    name: site build + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clearvoiance/site lint
      - run: pnpm --filter @clearvoiance/site typecheck
      - run: pnpm --filter @clearvoiance/site build

  ui-e2e:
    name: ui e2e (Playwright, mocked engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @clearvoiance/ui exec playwright install --with-deps chromium
      # Full happy-path: login → dashboard → sessions → replays → settings.
      # Engine responses are stubbed via page.route(); no docker needed here.
      - run: pnpm --filter @clearvoiance/ui test:e2e
