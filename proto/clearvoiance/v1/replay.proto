// ReplayService — Phase 2.
// Reads captured events from a session and replays them against a target URL
// at a configurable speedup. Phase 2a shipped the HTTP dispatcher; Phase 2b
// adds auth strategies + virtual-user fan-out with body mutators.
syntax = "proto3";

package clearvoiance.v1;

service ReplayService {
  rpc StartReplay(StartReplayRequest) returns (StartReplayResponse);
  rpc GetReplay(GetReplayRequest) returns (GetReplayResponse);
  rpc CancelReplay(CancelReplayRequest) returns (CancelReplayResponse);
}

message StartReplayRequest {
  string source_session_id = 1;
  string target_url = 2;
  double speedup = 3;
  string label = 4;

  // How many virtual users to fan each captured event out to. 1 (or 0) = one
  // dispatch per event (original behaviour). N = N dispatches per event, with
  // the mutator applied at VU indices 0..N-1 so unique-field collisions
  // (e.g. duplicate email) don't break the target.
  int32 virtual_users = 5;

  // Optional auth rewrite before dispatch. Unset = pass captured headers
  // through unchanged.
  AuthStrategy auth = 6;

  // Optional body mutation per virtual user. Unset = pass bodies through
  // unchanged.
  MutatorConfig mutator = 7;

  // Optional replay window (offsets from the session's first event, in ns).
  // window_end_offset_ns = 0 means "through the end of the session".
  // Events outside the window are filtered out before dispatch.
  int64 window_start_offset_ns = 8;
  int64 window_end_offset_ns = 9;

  // Optional target wall-clock duration for the replay, in milliseconds.
  // When set (> 0), speedup is COMPUTED as
  //   speedup = (window_duration_ns) / (target_duration_ms * 1e6)
  // and overrides the `speedup` field. Lets users say "replay this 1h window
  // in 5 minutes" without doing the arithmetic themselves.
  int64 target_duration_ms = 10;
}

// AuthStrategy selects how to rewrite auth credentials on replayed requests.
message AuthStrategy {
  oneof strategy {
    AuthNone none = 1;
    AuthStaticSwap static_swap = 2;
    AuthJwtResign jwt_resign = 3;
    AuthCallback callback = 4;
  }
}

message AuthNone {}

// Replaces the value of `header` with `token` on every dispatched request.
// Simple escape hatch for staging replays that need a single long-lived token.
message AuthStaticSwap {
  string header = 1;  // defaults to "Authorization" when empty
  string prefix = 2;  // e.g. "Bearer "
  string token = 3;
}

// Re-signs HS256 JWTs from the named header with a fresh expiry, preserving
// the original claims. Target must accept the signing_key on the replay side.
message AuthJwtResign {
  string header = 1;                 // defaults to "Authorization"
  string prefix = 2;                 // e.g. "Bearer "
  string signing_key = 3;            // HMAC secret
  int64 fresh_expiry_seconds = 4;    // defaults to 3600 when <= 0
}

// Posts {event_id, user_id, method, path} to `url`, expects back
// {header, value}. Responses are cached per user_id for cache_ttl_seconds.
message AuthCallback {
  string url = 1;
  int64 cache_ttl_seconds = 2;       // defaults to 300 when <= 0
}

// MutatorConfig selects how to rewrite request bodies per virtual user.
message MutatorConfig {
  oneof mutator {
    MutatorNone none = 1;
    MutatorUniqueFields unique_fields = 2;
    MutatorCustomScript custom_script = 3;
  }
}

message MutatorNone {}

// Appends a per-VU suffix to string fields matched by the given JSONPaths.
// Email fields get a "+vu{idx}" tag inserted before the "@"; other strings
// get "-vu{idx}" appended. Integers get "idx * int_multiplier" added.
message MutatorUniqueFields {
  repeated string json_paths = 1;    // e.g. ["$.email", "$.username"]
  int64 int_multiplier = 2;          // for integer fields; defaults to 1_000_000
}

// Runs a user-provided Starlark script per dispatch. The script must define
// `def mutate(body, content_type, vu) -> str` where body is the captured
// request body as a string and the return is the replacement body. The
// sandbox has no IO and the default starlark json module.
message MutatorCustomScript {
  string source = 1;
}

message StartReplayResponse {
  string replay_id = 1;
  int64 started_at_ns = 2;
}

message GetReplayRequest {
  string replay_id = 1;
}

message GetReplayResponse {
  string replay_id = 1;
  string source_session_id = 2;
  string target_url = 3;
  double speedup = 4;
  string status = 5;  // pending | running | completed | failed | cancelled
  int64 started_at_ns = 6;
  int64 finished_at_ns = 7;
  int64 events_dispatched = 8;
  int64 events_failed = 9;
  double p50_latency_ms = 10;
  double p95_latency_ms = 11;
  double p99_latency_ms = 12;
  double max_lag_ms = 13;
}

message CancelReplayRequest {
  string replay_id = 1;
}

message CancelReplayResponse {
  string status = 1;
}
