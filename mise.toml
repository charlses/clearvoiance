# Tool version pins for clearvoiance.
# Install everything: `mise install`
# Docs: https://mise.jdx.dev/

[tools]
go = "1.26.2"
node = "24.15.0"
pnpm = "10.33.0"
just = "1.49.0"
buf = "1.68.1"

# protoc plugins (Go) — installed on first `just proto`.
# protoc-gen-go and protoc-gen-go-grpc are Go binaries; installed via `go install`.

[env]
CLEARVOIANCE_ROOT = "{{config_root}}"
